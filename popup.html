<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="header">
        Tracker Dashboard
        <svg id="settingsBtn" class="settings-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20"
            height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z">
            </path>
        </svg>
    </div>
    <div class="container">
        <!-- ТАЙМЕР -->
        <div class="timer-section" id="timerSection" style="display: none;">
            <input type="text" id="timerTask" placeholder="Ссылка на задачу..." class="timer-input">

            <div class="timer-display">
                <input type="text" inputmode="numeric" id="timerHours" value="00" class="timer-time" placeholder="00"
                    disabled>
                <span class="timer-colon">:</span>
                <input type="text" inputmode="numeric" id="timerMinutes" value="00" class="timer-time" placeholder="00"
                    disabled>
                <span class="timer-colon">:</span>
                <input type="text" inputmode="numeric" id="timerSeconds" value="00" class="timer-time" placeholder="00"
                    disabled>
            </div>
            <div class="timer-meta" style="text-align: center; margin-top: 4px;">
                <span class="timer-spent-info" id="timerSpentInfo"></span>
            </div>

            <div class="timer-controls">
                <!-- Start SVG -->
                <button id="btnTimerStart" class="btn-timer btn-start" title="Старт / Продолжить">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                    </svg>
                </button>
                <!-- Pause SVG -->
                <button id="btnTimerPause" class="btn-timer btn-pause" title="Пауза" style="display: none;">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="6" y="4" width="4" height="16"></rect>
                        <rect x="14" y="4" width="4" height="16"></rect>
                    </svg>
                </button>
                <!-- Stop SVG -->
                <button id="btnTimerStop" class="btn-timer btn-stop" title="Остановить и Сохранить">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    </svg>
                </button>
                <!-- Reset SVG -->
                <button id="btnTimerReset" class="btn-timer btn-reset" title="Сбросить (Без сохранения)">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="1 4 1 10 7 10"></polyline>
                        <polyline points="23 20 23 14 17 14"></polyline>
                        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path>
                    </svg>
                </button>
            </div>
            <div id="timerStatus" class="timer-status-msg"></div>
        </div>

        <div id="spinner" class="spinner">Загрузка...</div>
        <div id="error" class="error-msg"></div>
        <div id="content"></div>
    </div>
    <script src="popup.js"></script>
</body>

</html>
